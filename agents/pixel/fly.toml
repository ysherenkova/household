# Pixel — Fly.io config
# Long-polling Telegram bot — no HTTP service, must stay always on.

app = 'sherenkov-pixel'
primary_region = 'iad'

[build]

[deploy]
  strategy = "rolling"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  auto_stop_machines = "off"
  auto_start_machines = false
