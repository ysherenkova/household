name: Household — dispatches Miles (flight survey)

on:
  schedule:
    # Three times daily — Atlanta is UTC-4 (EDT) / UTC-5 (EST)
    # 08:00 ET → 12:00 UTC
    - cron: "0 12 * * *"
    # 12:00 ET → 16:00 UTC
    - cron: "0 16 * * *"
    # 19:00 ET → 23:00 UTC
    - cron: "0 23 * * *"
  workflow_dispatch:   # manual trigger from GitHub Actions tab

jobs:
  miles-flight-survey:
    name: Miles — flight search & notify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Dispatch Miles
        working-directory: agents/miles
        env:
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_YULIIA:   ${{ secrets.TELEGRAM_CHAT_ID_YULIIA }}
          TELEGRAM_CHAT_ID_IVAN:     ${{ secrets.TELEGRAM_CHAT_ID_IVAN }}
        run: python main.py
