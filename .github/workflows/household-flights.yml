name: Household — dispatches Miles (flight survey)

on:
  schedule:
    # Once daily — 20:00 ET (Atlanta) = 00:00 UTC next day
    # EDT (Mar–Nov): UTC-4 → 00:00 UTC
    # EST (Nov–Mar): UTC-5 → 01:00 UTC (1h off, acceptable)
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      args:
        description: "Extra args for main.py (e.g. --extended, --date 2026-05-02)"
        required: false
        default: ""

jobs:
  miles-flight-survey:
    name: Miles — flight search & notify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Dispatch Miles
        working-directory: agents/miles
        env:
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_YULIIA:   ${{ secrets.TELEGRAM_CHAT_ID_YULIIA }}
          TELEGRAM_CHAT_ID_IVAN:     ${{ secrets.TELEGRAM_CHAT_ID_IVAN }}
        run: python main.py ${{ github.event.inputs.args }}
